name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run tests
        run: pnpm run test:run

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Determine tag from ref or input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          
          echo "Creating release for tag: $TAG"
          
          # Create release
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release $TAG" \
            --repo "${{ github.repository }}"
          
          # Upload artifacts (files only, skip directories)
          for asset in dist/*; do
            if [ -f "$asset" ]; then
              gh release upload "$TAG" "$asset" --repo "${{ github.repository }}"
            fi
          done

      - name: Verify Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          gh release view "$TAG" --repo "${{ github.repository }}" --json tagName,url --jq '{tag: .tag_name, url: .url}'
