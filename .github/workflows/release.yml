name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run tests
        run: pnpm run test:run

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine tag
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -z "$TAG" ] || [ "$TAG" == "$GITHUB_REF" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          
          if [ -z "$TAG" ]; then
            echo "Error: No tag provided. Use workflow_dispatch with a tag input."
            exit 1
          fi
          
          echo "Creating release for tag: $TAG"
          
          # Create release
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release $TAG" \
            --repo "${{ github.repository }}"
          
          # Upload artifacts
          for asset in dist/*; do
            gh release upload "$TAG" "$asset" --repo "${{ github.repository }}"
          done

      - name: Verify Release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -z "$TAG" ] || [ "$TAG" == "$GITHUB_REF" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          gh release view "$TAG" --repo "${{ github.repository }}" --json tagName,url --jq '{tag: .tag_name, url: .url}'
