name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci || npm install

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Get tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          prev_tag=$(git describe --tags --abbrev=0 ${{ steps.tag.outputs.version }}^ 2>/dev/null || echo "v1.0.0")
          changes=$(git log $prev_tag..${{ steps.tag.outputs.version }} --pretty=format:"- %s (%h)" --no-merges)
          {
            echo "notes<<EOF"
            echo "## Changes in ${{ steps.tag.outputs.version }}"
            echo ""
            echo "$changes"
            echo ""
            echo "## Statistics"
            echo "- Files changed: $(git diff $prev_tag..${{ steps.tag.outputs.version }} --numstat | wc -l)"
            echo "- Lines added: $(git diff $prev_tag..${{ steps.tag.outputs.version }} --numstat | awk '{sum+=$1} END {print sum}')"
            echo "- Lines removed: $(git diff $prev_tag..${{ steps.tag.outputs.version }} --numstat | awk '{sum+=$2} END {print sum}')"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: Release ${{ steps.tag.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false